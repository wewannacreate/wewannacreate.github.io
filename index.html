<!DOCTYPE html>
<html>
<head>
  <title>All Your Arts</title>
  
  <!-- Google Fonts for soft aesthetic -->
  <link href="https://fonts.googleapis.com/css2?family=Cookie&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

  <style>
    /* BODY STYLING */
    body {
      background-color: #fdf6f0;  /* soft pastel cream */
      font-family: 'Quicksand', sans-serif;
      color: #5c4a3f;
      text-align: center;
      margin: 0;
      padding: 50px;
    }

    /* HEADER */
    h1 {
      font-family: 'Cookie', cursive;
      color: #a57c6c;
      font-size: 3em;
      margin-bottom: 10px;
    }

    /* PARAGRAPH */
    p {
      font-size: 1.2em;
      margin-bottom: 30px;
    }

    /* BUTTON */
    button {
      padding: 12px 25px;
      font-size: 16px;
      border: none;
      border-radius: 12px;
      background-color: #d8cfc4;
      color: #5c4a3f;
      cursor: pointer;
      transition: all 0.3s;
    }

    button:hover {
      background-color: #c5bfa9;
      transform: scale(1.05);
    }

    /* IMAGE */
    img {
      max-width: 300px;
      margin-top: 30px;
      border-radius: 15px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>
  <h1>Scroll throigh unique arts and crafts</h1>
  <p>Hi! This is my soft aesthetic website. You can customize everything here — fonts, colors, images, and more.</p>

  <!-- Button example -->
  <button onclick="alert('Hello! 🌸')">Click me 🌼</button>

  <!-- Add your image here -->
  <img src="https://via.placeholder.com/300x200.png?text=Your+Image" alt="Cute Image">

</body>
</html>
